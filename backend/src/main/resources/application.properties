spring.application.name=mohsinon

#################################################
# PostgreSQL
#################################################

spring.datasource.url=jdbc:postgresql://localhost:5432/mohsinon_db
spring.datasource.username=postgres
spring.datasource.password=2209
spring.datasource.driver-class-name=org.postgresql.Driver

#################################################
# Hibernate
#################################################

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#################################################
# Time Zone
#################################################

spring.jpa.properties.hibernate.jdbc.time_zone=UTC

#################################################
# Server
#################################################

server.port=8080

#################################################
# Logging
#################################################

logging.level.org.springframework.security=DEBUG
#logging.level.org.hibernate.tool.schema=DEBUG

#################################################
# JWT
#################################################

jwt.secret=MyVeryStrongSecretKeyForMohsinonPlatform2026AtLeast32Characters
jwt.expiration=86400000